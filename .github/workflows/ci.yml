name: CI

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        compiler: [gcc, clang]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up C++ environment
      run: |
        sudo apt-get update
        sudo apt-get install -y valgrind clang-format
        if [ ${{ matrix.compiler }} == 'gcc' ]; then
          sudo apt-get install -y g++
        elif [ ${{ matrix.compiler }} == 'clang' ]; then
          sudo apt-get install -y clang
        fi

    - name: Check code formatting
      run: |
        find src tests -name '*.hpp' -o -name '*.cpp' | xargs clang-format -style=file -output-replacements-xml | grep "<replacement " && echo "Code is not formatted" && exit 1 || echo "Code is formatted"

    - name: Build
      run: |
        if [ ${{ matrix.compiler }} == 'gcc' ]; then
          make CXX=g++
        elif [ ${{ matrix.compiler }} == 'clang' ]; then
          make CXX=clang++
        fi

    - name: Run main program
      run: |
        ./bin/Train input/railNetworkPrintFolder/railNetworkPrintGood.txt input/trainPrintFolder/trainPrintGood.txt

    - name: Run tests
      run: |
        if [ ${{ matrix.compiler }} == 'gcc' ]; then
          make CXX=g++ test
        elif [ ${{ matrix.compiler }} == 'clang' ]; then
          make CXX=clang++ test
        fi

    - name: Valgrind - tests
      run: |
        valgrind --leak-check=full --show-leak-kinds=all --error-exitcode=1 ./bin/SingletonTest
        valgrind --leak-check=full --show-leak-kinds=all --error-exitcode=1 ./bin/NodeTest
        valgrind --leak-check=full --show-leak-kinds=all --error-exitcode=1 ./bin/RailNetworkTest

    - name: Valgrind - main program
      run: |
        valgrind --leak-check=full --show-leak-kinds=all --error-exitcode=1 ./bin/Train input/railNetworkPrintFolder/railNetworkPrintGood.txt input/trainPrintFolder/trainPrintGood.txt
