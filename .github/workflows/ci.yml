name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true  # Enforce Node.js 20

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [g++, clang++]  # Matrix to test with both g++ and clang++
        include:
          - compiler: g++
            cc: g++
            std: c++14  # Use C++14 standard for g++
          - compiler: clang++
            cc: clang++
            std: c++14  # Use C++14 standard for clang++

    steps:
    - name: Set up Node.js  # Set up Node.js environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Checkout repository  # Check out the repository
      uses: actions/checkout@v4

    - name: Remove conflicting packages
      run: |
        sudo apt-get remove -y libopencl-clang-12-dev libopencl-clang-dev python3-clang-11 python3-clang-12 python3-clang-13 python3-clang-14 python3-clang-15

    - name: Update package list
      run: sudo apt-get update

    - name: Install required packages
      run: |
        sudo apt-get install -y clang++ clang-format lcov valgrind
      shell: /usr/bin/bash -e {0}
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true

    - name: Fix broken dependencies
      run: sudo apt-get update && sudo apt-get install -f

    - name: Install C++ Tools
      run: sudo apt-get install -y ${{ matrix.compiler }} clang-format lcov valgrind

    - name: Check code formatting  # Check code formatting
      run: |
        find include src -name '*.hpp' -o -name '*.cpp' | xargs clang-format -style=file -output-replacements-xml | grep "<replacement " && echo "Code is not formatted" && exit 1 || echo "Code is formatted"

    - name: Create bin directory  # Create bin directory
      run: mkdir -p bin

    - name: Compile main program  # Compile main program
      run: |
        ${{ matrix.cc }} -Wall -Wextra -Werror -std=${{ matrix.std }} -o bin/main src/main.cpp

    - name: Run main program  # Run the compiled main program
      run: |
        if [ -f ./bin/main ]; then
          ./bin/main input/railNetworkPrintFolder/railNetworkPrintGood.txt input/trainPrintFolder/trainPrintGood.txt
        else
          echo "Main binary not found"
          exit 1
        fi

    - name: Compile Singleton tests with coverage
      run: ${{ matrix.cc }} -Wall -Wextra -Werror -std=${{ matrix.std }} --coverage -o bin/testSingleton tests/SingletonTest.cpp

    - name: Run Singleton tests
      run: ./bin/testSingleton

    - name: Run Singleton tests with Valgrind
      run: |
        valgrind --leak-check=full --show-leak-kinds=all ./bin/testSingleton > valgrind-singleton.log 2>&1 || true
    - name: Upload Valgrind log for Singleton tests
      uses: actions/upload-artifact@v4
      with:
        name: valgrind-singleton-log-${{ github.run_number }}
        path: valgrind-singleton.log

    - name: Compile Node tests with coverage
      run: ${{ matrix.cc }} -Wall -Wextra -Werror --coverage -std=${{ matrix.std }} -o bin/testNode tests/NodeTest.cpp src/Node.cpp

    - name: Run Node tests
      run: ./bin/testNode

    - name: Run Node tests with Valgrind
      run: |
        valgrind --leak-check=full --show-leak-kinds=all ./bin/testNode > valgrind-node.log 2>&1 || true
    - name: Upload Valgrind log for Node tests
      uses: actions/upload-artifact@v4
      with:
        name: valgrind-node-log-${{ github.run_number }}
        path: valgrind-node.log

    - name: Generate coverage report
      run: |
        lcov --capture --directory . --output-file coverage.info
        lcov --remove coverage.info '/usr/*' --output-file coverage.info
        genhtml coverage.info --output-directory coverage

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      continue-on-error: true
      with:
        name: coverage-report-${{ github.run_number }}
        path: coverage
        if-no-files-found: warn
        compression-level: 6
        overwrite: true
        include-hidden-files: false
