name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true  # Enforce Node.js 20

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]
        include:
          - build-type: build
          - build-type: test

    steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up C++ environment
      run: sudo apt-get install -y g++ clang-format

    - name: Install dependencies
      run: sudo apt-get install -y build-essential lcov

    - name: Check code formatting
      run: |
        find includes src -name '*.hpp' -o -name '*.cpp' | xargs clang-format -style=file -output-replacements-xml | grep "<replacement " && echo "Code is not formatted" && exit 1 || echo "Code is formatted"
      continue-on-error: true

    - name: Create bin directory
      run: mkdir -p bin

    - name: Compile Singleton tests with coverage
      run: g++ -Wall -Wextra -std=c++14 --coverage -o bin/testSingleton src/SingletonTest.cpp

    - name: Run Singleton tests
      run: |
        if [ -f ./bin/testSingleton ]; then
          ./bin/testSingleton
        else
          echo "testSingleton binary not found"
          exit 1
        fi

    - name: Generate coverage report
      if: matrix.build-type == 'test'
      run: |
        lcov --capture --directory . --output-file coverage.info
        lcov --remove coverage.info '/usr/*' --output-file coverage.info
        genhtml coverage.info --output-directory coverage

    - name: Upload coverage report
      if: matrix.build-type == 'test'
      uses: actions/upload-artifact@v4
      continue-on-error: true
      with:
        name: coverage-report-${{ github.run_number }}
        path: coverage
        if-no-files-found: warn
        compression-level: 6
        overwrite: true
        include-hidden-files: false