name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
      
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true  # Enforce Node.js 20


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Set up Node.js  # Step to set up Node.js
      uses: actions/setup-node@v3  # Use the latest version of the setup-node action
      with:
        node-version: '20'  # Specify Node.js version 20

    - name: Checkout repository  # Step to check out the repository
      uses: actions/checkout@v3  # Use the latest version of the checkout action

    - name: Set up C++ environment  # Step to set up the C++ environment
      run: sudo apt-get install -y g++  # Install g++ compiler

    - name: Install dependencies  # Step to install necessary dependencies
      run: sudo apt-get install -y build-essential lcov  # Install build-essential and lcov packages

    - name: Create bin directory  # Step to create the bin directory
      run: mkdir -p bin  # Create the bin directory if it doesn't exist

    - name: Compile Singleton tests with coverage  # Step to compile Singleton tests with coverage flags
      run: g++ -Wall -Wextra -std=c++14 --coverage -o bin/testSingleton src/SingletonTest.cpp  # Compile the Singleton tests with coverage flags

    - name: Run Singleton tests  # Step to run Singleton tests
      run: ./bin/testSingleton  # Run the Singleton tests binary

    - name: Generate coverage report  # Step to generate coverage report
      run: |
        lcov --capture --directory . --output-file coverage.info  # Capture the coverage data
        lcov --remove coverage.info '/usr/*' --output-file coverage.info  # Remove coverage data for system files
        genhtml coverage.info --output-directory coverage  # Generate HTML report

    - name: Upload coverage report  # Step to upload coverage report
      uses: actions/upload-artifact@v4  # Use the latest version of the upload-artifact action
      with:
        name: coverage-report  # Name of the artifact
        path: coverage  # Path to the coverage report directory
        if-no-files-found: warn  # Warn if no files are found
        compression-level: 6  # Set compression level
        overwrite: true  # Allow overwriting the existing artifact
        include-hidden-files: false  # Do not include hidden files

  test:
    runs-on: ubuntu-latest

    steps:
    - name: Set up Node.js  # Step to set up Node.js
      uses: actions/setup-node@v3  # Use the latest version of the setup-node action
      with:
        node-version: '20'  # Specify Node.js version 20

    - name: Checkout repository  # Step to check out the repository
      uses: actions/checkout@v3  # Use the latest version of the checkout action

    - name: Set up C++ environment  # Step to set up the C++ environment
      run: sudo apt-get install -y g++  # Install g++ compiler

    - name: Install dependencies  # Step to install necessary dependencies
      run: sudo apt-get install -y build-essential lcov  # Install build-essential and lcov packages

    - name: Create bin directory  # Step to create the bin directory
      run: mkdir -p bin  # Create the bin directory if it doesn't exist

    - name: Compile Singleton tests with coverage  # Step to compile Singleton tests with coverage flags
      run: g++ -Wall -Wextra -std=c++14 --coverage -o bin/testSingleton src/SingletonTest.cpp  # Compile the Singleton tests with coverage flags

    - name: Run Singleton tests  # Step to run Singleton tests
      run: ./bin/testSingleton  # Run the Singleton tests binary

    - name: Generate coverage report  # Step to generate coverage report
      run: |
        lcov --capture --directory . --output-file coverage.info  # Capture the coverage data
        lcov --remove coverage.info '/usr/*' --output-file coverage.info  # Remove coverage data for system files
        genhtml coverage.info --output-directory coverage  # Generate HTML report

    - name: Upload coverage report  # Step to upload coverage report
      uses: actions/upload-artifact@v4  # Use the latest version of the upload-artifact action
      with:
        name: coverage-report  # Name of the artifact
        path: coverage  # Path to the coverage report directory
        if-no-files-found: warn  # Warn if no files are found
        compression-level: 6  # Set compression level
        overwrite: true  # Allow overwriting the existing artifact
        include-hidden-files: false  # Do not include hidden files